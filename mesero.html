<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <title>GestiónPro - Pedidos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-glass: rgba(255, 255, 255, 0.08);
            --bg-glass-hover: rgba(255, 255, 255, 0.12);
            --border-glass: rgba(255, 255, 255, 0.1);
            --border-glass-strong: rgba(255, 255, 255, 0.18);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #6366f1;
            --accent-blue-glow: rgba(99, 102, 241, 0.3);
            --accent-green: #10b981;
            --accent-green-glow: rgba(16, 185, 129, 0.25);
            --accent-amber: #f59e0b;
            --accent-amber-glow: rgba(245, 158, 11, 0.25);
            --accent-red: #ef4444;
            --accent-red-glow: rgba(239, 68, 68, 0.25);
            --accent-purple: #a855f7;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.15);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            z-index: 9999;
        }

        .loading-orb {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--accent-blue), var(--accent-purple));
            animation: pulse-orb 1.5s ease-in-out infinite, float-orb 3s ease-in-out infinite;
            box-shadow: 0 0 40px var(--accent-blue-glow), 0 0 80px rgba(99, 102, 241, 0.1);
        }

        @keyframes pulse-orb {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes float-orb {
            0%, 100% { translate: 0 0; }
            50% { translate: 0 -10px; }
        }

        .loading-screen p {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }


        /* ===== HEADER ===== */
        .header {
            background: rgba(15, 15, 26, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-glass);
        }

        .header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .header-btns {
            display: flex;
            gap: 6px;
        }

        .header-btns button {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btns button:active {
            background: var(--bg-glass-hover);
            transform: scale(0.92);
        }


        /* ===== MESAS VIEW ===== */
        .section-title {
            padding: 24px 20px 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .mesas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 14px;
            padding: 0 20px 100px;
        }

        .mesa-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 22px 16px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .mesa-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at top, rgba(255,255,255,0.05), transparent 70%);
            pointer-events: none;
        }

        .mesa-card:active {
            transform: scale(0.95);
        }

        .mesa-card.libre {
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.08);
        }

        .mesa-card.libre::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-green), #34d399);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
        }

        .mesa-card.ocupada {
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.08);
        }

        .mesa-card.ocupada::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-amber), #fbbf24);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
        }

        .mesa-card .mesa-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .mesa-card .mesa-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .mesa-card .mesa-status {
            font-size: 0.7rem;
            margin-top: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mesa-card.libre .mesa-status { color: var(--accent-green); }
        .mesa-card.ocupada .mesa-status { color: var(--accent-amber); }

        .mesa-card .mesa-total {
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-top: 6px;
            font-weight: 800;
        }

        .mesa-card .mesa-items-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, var(--accent-amber), #f97316);
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-size: 0.72rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.4);
        }


        /* ===== ORDER VIEW ===== */
        .order-view {
            display: none;
            height: calc(100vh - 57px);
            height: calc(100dvh - 57px);
            overflow: hidden;
            flex-direction: column;
        }

        .order-view.active { display: flex; }

        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
        }

        .order-header h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .btn-back {
            background: var(--bg-glass);
            color: var(--text-secondary);
            border: 1px solid var(--border-glass);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .btn-back:active {
            background: var(--bg-glass-hover);
            transform: scale(0.95);
        }

        /* ===== CATEGORIES BAR ===== */
        .categories-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 20px;
            background: rgba(15, 15, 26, 0.5);
            border-bottom: 1px solid var(--border-glass);
            -ms-overflow-style: none;
            scrollbar-width: none;
            flex-shrink: 0;
            align-items: center;
            min-height: auto;
            max-height: 52px;
        }

        .categories-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            padding: 10px 18px;
            border-radius: var(--radius-lg);
            font-size: 0.82rem;
            white-space: nowrap;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all var(--transition-smooth);
        }

        .cat-btn.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 16px var(--accent-blue-glow);
        }

        .cat-btn:active { transform: scale(0.93); }


        /* ===== PRODUCTS GRID ===== */
        .order-main-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .products-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            background: var(--bg-primary);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
            gap: 10px;
        }

        .product-btn {
            background: var(--bg-glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .product-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at top center, rgba(255,255,255,0.04), transparent 60%);
            pointer-events: none;
        }

        .product-btn:active {
            transform: scale(0.93);
            background: var(--bg-glass-hover);
            border-color: var(--accent-blue);
            box-shadow: 0 0 16px var(--accent-blue-glow);
        }

        .product-btn.with-image {
            padding: 10px;
            text-align: left;
        }

        .product-btn.with-image img {
            border-radius: 8px;
        }

        .product-btn .prod-name {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-btn .prod-price {
            font-size: 0.88rem;
            color: var(--accent-blue);
            font-weight: 800;
        }

        .product-btn .prod-stock {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
        }


        /* ===== ORDER PANEL (Bottom Sheet) ===== */
        .order-panel {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border-top: 1px solid var(--border-glass-strong);
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.4);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 0;
            max-height: 52vh;
            display: flex;
            flex-direction: column;
            transition: max-height var(--transition-smooth);
        }

        .order-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 10px;
            cursor: pointer;
        }

        .order-panel-header::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .order-panel-header h3 {
            font-size: 0.92rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .order-panel-header .badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border-radius: var(--radius-sm);
            padding: 3px 10px;
            font-size: 0.72rem;
            font-weight: 800;
            box-shadow: 0 2px 8px var(--accent-blue-glow);
        }

        .order-items-scroll {
            overflow-y: auto;
            max-height: 22vh;
            padding: 0 20px;
        }

        .order-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-glass);
            gap: 10px;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .order-item:last-child { border-bottom: none; }

        .order-item-name {
            font-weight: 500;
            font-size: 0.85rem;
            flex: 1;
            color: var(--text-primary);
        }

        .order-item-qty {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            transition: all var(--transition-fast);
        }

        .qty-btn:active { transform: scale(0.85); }
        .qty-btn.minus { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
        .qty-btn.plus { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }

        .qty-num {
            font-weight: 800;
            min-width: 24px;
            text-align: center;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .order-item-price {
            font-weight: 700;
            color: var(--text-primary);
            min-width: 65px;
            text-align: right;
            font-size: 0.88rem;
        }

        .empty-order {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }


        /* ===== ORDER FOOTER & ACTIONS ===== */
        .order-footer {
            padding: 12px 20px 20px;
        }

        .order-total {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: var(--radius-md);
            margin-bottom: 14px;
        }

        .order-total span:first-child {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .order-total span:last-child {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .order-actions {
            display: grid;
            grid-template-columns: auto 1fr 1fr 1fr;
            gap: 8px;
        }

        .order-actions button {
            padding: 15px 12px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .order-actions button:active { transform: scale(0.94); }

        .btn-cancel-order {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2) !important;
            font-size: 1.2rem !important;
            padding: 15px 16px !important;
        }

        .btn-send {
            background: linear-gradient(135deg, var(--accent-blue), #4f46e5);
            color: white;
            box-shadow: 0 4px 16px var(--accent-blue-glow);
        }

        .btn-prebill {
            background: linear-gradient(135deg, var(--accent-amber), #d97706);
            color: white;
            box-shadow: 0 4px 16px var(--accent-amber-glow);
        }

        .btn-pay {
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: white;
            box-shadow: 0 4px 16px var(--accent-green-glow);
        }


        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast {
            padding: 14px 28px;
            border-radius: var(--radius-md);
            color: white;
            font-size: 0.88rem;
            font-weight: 600;
            animation: fadeUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .toast.success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(5, 150, 105, 0.9));
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .toast.error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(185, 28, 28, 0.9));
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .toast.info {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.9), rgba(79, 70, 229, 0.9));
            border: 1px solid rgba(99, 102, 241, 0.4);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== SCROLLBAR STYLING ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }


        /* ===== RESPONSIVE - TABLET ===== */
        @media (min-width: 768px) {
            .mesas-grid {
                grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
                padding: 0 32px 32px;
                gap: 18px;
            }

            .section-title { padding: 28px 32px 16px; }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 14px;
            }

            .order-view.active {
                flex-direction: column;
            }

            .order-view .order-main-area {
                display: flex;
                flex-direction: row;
                flex: 1;
                overflow: hidden;
            }

            .products-section {
                flex: 1;
                padding: 20px 24px;
            }

            .order-panel {
                max-height: none;
                width: 340px;
                border-radius: 0;
                border-left: 1px solid var(--border-glass);
                border-top: none;
                box-shadow: -8px 0 32px rgba(0, 0, 0, 0.3);
            }

            .order-panel-header::before { display: none; }

            .order-items-scroll {
                max-height: none;
                flex: 1;
            }

            .order-actions {
                grid-template-columns: auto 1fr 1fr 1fr;
            }

            .header {
                padding: 16px 32px;
            }

            .mesa-card { padding: 28px 20px; }
        }

        @media (min-width: 1024px) {
            .mesas-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                max-width: 1200px;
                margin: 0 auto;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .order-panel { width: 380px; }
        }

        /* ===== UTILITIES ===== */
        .hidden { display: none !important; }

        /* Safe area padding for notch devices */
        @supports (padding-top: env(safe-area-inset-top)) {
            .header { padding-top: calc(14px + env(safe-area-inset-top)); }
            .order-footer { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-orb"></div>
        <p>Cargando pedidos...</p>
    </div>

    <!-- Header -->
    <header class="header">
        <h1>📋 Pedidos</h1>
        <div class="header-btns">
            <button onclick="window.open('fichas-mesero.html','_blank')" aria-label="Fichas">📖</button>
            <button onclick="window.location.href='index.html'" aria-label="Inicio">🏠</button>
            <button onclick="location.reload()" aria-label="Recargar">🔄</button>
            <button onclick="auth.signOut().then(()=>window.location.href='login.html')" aria-label="Salir">🚪</button>
        </div>
    </header>

    <!-- Vista de Mesas -->
    <div id="mesas-view">
        <div class="section-title">Selecciona una mesa</div>
        <div class="mesas-grid" id="mesas-grid"></div>
    </div>

    <!-- Vista de Pedido -->
    <div class="order-view" id="order-view">
        <div class="order-header">
            <button class="btn-back" onclick="showMesas()">← Mesas</button>
            <h2>🍽️ <span id="order-mesa-name">Mesa 1</span></h2>
        </div>

        <div class="categories-bar" id="categories-bar"></div>

        <div class="order-main-area">
            <div class="products-section">
                <div style="padding:0 0 12px;"><input type="text" id="product-search" placeholder="🔍 Buscar producto..." style="width:100%;padding:12px 16px;background:var(--bg-glass, rgba(255,255,255,0.08));border:1px solid var(--border-glass, rgba(255,255,255,0.1));border-radius:12px;color:var(--text-primary, #f1f5f9);font-size:0.9rem;outline:none;"></div>
                <div class="products-grid" id="products-grid"></div>
            </div>

            <div class="order-panel">
            <div class="order-panel-header" id="order-panel-header">
                <h3>🧾 Pedido <span class="badge" id="order-count">0</span></h3>
            </div>
            <div class="order-items-scroll" id="order-items-list">
                <p class="empty-order">Toca un producto para agregarlo</p>
            </div>
            <div class="order-footer">
                <div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;">
                    <button class="pay-method-btn active" onclick="selectPayMethod(this,'Efectivo')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border-glass,#333);background:var(--accent-green,#10b981);color:white;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;">💵 Efectivo</button>
                    <button class="pay-method-btn" onclick="selectPayMethod(this,'Nequi')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border-glass,#333);background:var(--bg-glass,#222);color:var(--text-secondary,#aaa);font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;">📱 Nequi</button>
                    <button class="pay-method-btn" onclick="selectPayMethod(this,'Daviplata')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border-glass,#333);background:var(--bg-glass,#222);color:var(--text-secondary,#aaa);font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;">📱 Daviplata</button>
                    <button class="pay-method-btn" onclick="selectPayMethod(this,'Tarjeta')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border-glass,#333);background:var(--bg-glass,#222);color:var(--text-secondary,#aaa);font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;">💳 Tarjeta</button>
                    <button class="pay-method-btn" onclick="selectPayMethod(this,'Transferencia')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border-glass,#333);background:var(--bg-glass,#222);color:var(--text-secondary,#aaa);font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;">🏦 Transf</button>
                </div>
                <div class="order-total">
                    <span>Total</span>
                    <span id="order-total-value">$0</span>
                </div>
                <div class="order-actions">
                    <button class="btn-cancel-order" onclick="clearCurrentOrder()" aria-label="Cancelar">🗑️</button>
                    <button class="btn-send" onclick="sendOrder()">📤 Enviar</button>
                    <button class="btn-prebill" onclick="printPreBill()">🧾 Pre</button>
                    <button class="btn-pay" onclick="payOrder()">💰 Cobrar</button>
                </div>
            </div>
        </div><!-- /order-panel -->
        </div><!-- /order-main-area -->
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="tickets.js"></script>
    <script src="mesero.js"></script>
</body>
</html>
