<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GestiónPro - Tomar Pedido</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; min-height: 100vh; }
        
        .header { background: #1e293b; color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.1rem; }
        .header-btns { display: flex; gap: 8px; }
        .header-btns button { background: #334155; border: none; color: white; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
        .header-btns .btn-danger { background: #dc2626; }
        
        .mesas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 16px; }
        .mesa-card { background: white; border-radius: 12px; padding: 20px 16px; text-align: center; cursor: pointer; border: 2px solid #e2e8f0; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .mesa-card:active { transform: scale(0.95); }
        .mesa-card.libre { border-color: #16a34a; }
        .mesa-card.ocupada { border-color: #f59e0b; background: #fffbeb; }
        .mesa-card .mesa-icon { font-size: 2rem; margin-bottom: 8px; }
        .mesa-card .mesa-name { font-weight: 700; font-size: 1rem; color: #1e293b; }
        .mesa-card .mesa-status { font-size: 0.75rem; margin-top: 4px; font-weight: 600; }
        .mesa-card.libre .mesa-status { color: #16a34a; }
        .mesa-card.ocupada .mesa-status { color: #f59e0b; }
        .mesa-card .mesa-total { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
        
        /* Order View */
        .order-view { display: none; padding: 16px; }
        .order-view.active { display: block; }
        .order-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .order-header h2 { font-size: 1.2rem; color: #1e293b; }
        .btn-back { background: #64748b; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
        
        .categories-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; }
        .categories-bar::-webkit-scrollbar { display: none; }
        .cat-btn { background: white; border: 2px solid #e2e8f0; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; white-space: nowrap; cursor: pointer; font-weight: 500; }
        .cat-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; max-height: 40vh; overflow-y: auto; }
        .product-btn { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
        .product-btn:active { transform: scale(0.95); background: #eff6ff; }
        .product-btn .prod-name { font-size: 0.85rem; font-weight: 600; color: #1e293b; margin-bottom: 4px; }
        .product-btn .prod-price { font-size: 0.8rem; color: #2563eb; font-weight: 700; }
        
        .order-items { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        .order-items h3 { font-size: 0.95rem; color: #64748b; margin-bottom: 10px; }
        .order-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .order-item:last-child { border-bottom: none; }
        .order-item-name { font-weight: 500; font-size: 0.9rem; flex: 1; }
        .order-item-qty { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .qty-btn.minus { background: #fee2e2; color: #dc2626; }
        .qty-btn.plus { background: #dcfce7; color: #16a34a; }
        .qty-num { font-weight: 700; min-width: 20px; text-align: center; }
        .order-item-price { font-weight: 600; color: #1e293b; min-width: 70px; text-align: right; }
        
        .order-total { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: #1e293b; color: white; border-radius: 12px; margin-bottom: 12px; }
        .order-total span:first-child { font-size: 1rem; }
        .order-total span:last-child { font-size: 1.3rem; font-weight: 700; }
        
        .order-actions { display: flex; gap: 10px; }
        .order-actions button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-send { background: #2563eb; color: white; }
        .btn-send:active { background: #1d4ed8; }
        .btn-pay { background: #16a34a; color: white; }
        .btn-pay:active { background: #15803d; }
        .btn-cancel-order { background: #f1f5f9; color: #64748b; }
        
        .empty-order { text-align: center; padding: 30px; color: #94a3b8; }
        
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { padding: 12px 24px; border-radius: 10px; color: white; font-size: 0.9rem; font-weight: 500; animation: fadeUp 0.3s ease; }
        .toast.success { background: #16a34a; }
        .toast.error { background: #dc2626; }
        .toast.info { background: #2563eb; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading-screen">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>

    <header class="header">
        <h1>📋 Tomar Pedido</h1>
        <div class="header-btns">
            <button onclick="window.location.href='index.html'">🏠 App</button>
            <button class="btn-danger" onclick="auth.signOut().then(()=>window.location.href='login.html')">🚪</button>
        </div>
    </header>

    <!-- Vista de Mesas -->
    <div id="mesas-view">
        <div class="mesas-grid" id="mesas-grid"></div>
    </div>

    <!-- Vista de Pedido -->
    <div class="order-view" id="order-view">
        <div class="order-header">
            <button class="btn-back" onclick="showMesas()">← Mesas</button>
            <h2 id="order-mesa-name">Mesa 1</h2>
        </div>
        
        <div class="categories-bar" id="categories-bar"></div>
        <div class="products-grid" id="products-grid"></div>
        
        <div class="order-items" id="order-items-container">
            <h3>🧾 Pedido</h3>
            <div id="order-items-list">
                <p class="empty-order">Toca un producto para agregarlo</p>
            </div>
        </div>
        
        <div class="order-total">
            <span>Total:</span>
            <span id="order-total-value">$0</span>
        </div>
        
        <div class="order-actions">
            <button class="btn-cancel-order" onclick="clearCurrentOrder()">🗑️</button>
            <button class="btn-send" onclick="sendOrder()">📤 Enviar</button>
            <button class="btn-pay" onclick="payOrder()">💰 Cobrar</button>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="mesero.js"></script>
</body>
</html>
