<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <title>GestionPro - Pedidos</title>
    <link rel="manifest" href="manifest-mesero.json">
    <meta name="theme-color" content="#0c1222">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0c1222;
            --bg-secondary: #131c31;
            --bg-card: #1a2332;
            --bg-glass: rgba(26, 35, 50, 0.8);
            --bg-glass-hover: rgba(35, 48, 68, 0.9);
            --border-glass: rgba(255, 255, 255, 0.06);
            --border-glass-strong: rgba(255, 255, 255, 0.1);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent-blue: #635bff;
            --accent-blue-glow: rgba(99, 91, 255, 0.2);
            --accent-green: #10b981;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== LOADING ===== */
        .loading-screen { position: fixed; inset: 0; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; z-index: 9999; }
        .loading-orb { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border-glass-strong); border-top-color: var(--accent-blue); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen p { color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-glass-strong);
        }
        .header h1 { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .header-btns { display: flex; gap: 4px; }
        .header-btns button {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            width: 36px; height: 36px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition-fast);
        }
        .header-btns button:active { transform: scale(0.9); background: var(--bg-glass-hover); }

        /* ===== MESAS VIEW ===== */
        .section-title {
            padding: 20px 16px 10px;
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .mesas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 0 16px 80px;
        }

        /* Mesa Cards */
        .mesa-fp-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border-glass-strong);
            border-radius: var(--radius-md);
            padding: 14px 10px 12px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-smooth);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .mesa-fp-card:active { transform: scale(0.95); }
        .mesa-fp-card.libre { border-color: rgba(16, 185, 129, 0.25); }
        .mesa-fp-card.ocupada { border-color: rgba(245, 158, 11, 0.35); background: linear-gradient(180deg, rgba(245,158,11,0.04) 0%, var(--bg-card) 100%); }
        .mesa-fp-card.add-new { border-style: dashed; border-color: rgba(245,158,11,0.4); opacity: 0.7; }
        .mesa-fp-card.add-new:active { opacity: 1; }

        .mesa-fp-visual { display: flex; align-items: center; justify-content: center; min-height: 70px; }
        .mesa-fp-visual svg { max-width: 100%; height: auto; }
        .mesa-fp-icon { font-size: 1.8rem; margin: 6px 0; }
        .mesa-fp-name { font-weight: 700; font-size: 0.82rem; color: var(--text-primary); }
        .mesa-fp-status { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 2px 8px; border-radius: 12px; margin-top: 2px; }
        .mesa-fp-status.libre { color: var(--accent-green); background: rgba(16,185,129,0.1); }
        .mesa-fp-status.ocupada { color: var(--accent-amber); background: rgba(245,158,11,0.1); }
        .mesa-fp-total { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 800; margin-top: 2px; }
        .mesa-fp-capacity { font-size: 0.65rem; color: var(--text-muted); }
        .mesa-fp-badge { position: absolute; top: 8px; right: 8px; background: linear-gradient(135deg, var(--accent-amber), #f97316); color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 0.65rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }

        /* Floor Plan Mode */
        .mesas-grid.floor-plan-mode {
            display: block;
            position: relative;
            background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            min-height: 400px;
            margin: 0 16px 80px;
            overflow: auto;
        }

        /* ===== ORDER VIEW ===== */
        .order-view { display: none; height: calc(100dvh - 49px); overflow: hidden; flex-direction: column; }
        .order-view.active { display: flex; }

        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-glass);
        }
        .order-header h2 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .btn-back {
            background: var(--bg-glass); color: var(--text-secondary); border: 1px solid var(--border-glass);
            padding: 8px 14px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; font-weight: 600;
        }
        .btn-back:active { transform: scale(0.95); }

        /* Categories */
        .categories-bar {
            display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px;
            background: rgba(15,15,26,0.5); border-bottom: 1px solid var(--border-glass);
            scrollbar-width: none; flex-shrink: 0;
        }
        .categories-bar::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: var(--bg-glass); border: 1px solid var(--border-glass);
            padding: 8px 14px; border-radius: 20px; font-size: 0.78rem;
            white-space: nowrap; cursor: pointer; font-weight: 600; color: var(--text-secondary);
        }
        .cat-btn.active { background: var(--accent-blue); color: white; border-color: transparent; }
        .cat-btn:active { transform: scale(0.93); }

        /* Products */
        .order-main-area { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .products-section { flex: 1; overflow-y: auto; padding: 12px 16px; background: var(--bg-primary); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .product-btn {
            background: var(--bg-card); border: 1px solid var(--border-glass-strong);
            border-radius: var(--radius-sm); padding: 14px 10px; text-align: center;
            cursor: pointer; transition: all var(--transition-fast);
        }
        .product-btn:active { transform: scale(0.93); border-color: var(--accent-blue); }
        .product-btn.with-image { padding: 8px; text-align: left; }
        .product-btn .prod-name { font-size: 0.78rem; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
        .product-btn .prod-price { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: var(--accent-blue); font-weight: 800; }

        /* ===== ORDER PANEL ===== */
        .order-panel {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-glass-strong);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            max-height: 54vh;
            display: flex;
            flex-direction: column;
        }
        .order-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px 8px; position: relative;
        }
        .order-panel-header::before {
            content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
            width: 32px; height: 3px; background: rgba(255,255,255,0.12); border-radius: 3px;
        }
        .order-panel-header h3 { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .order-panel-header .badge { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border-radius: 8px; padding: 2px 8px; font-size: 0.68rem; font-weight: 800; }

        .order-items-scroll { overflow-y: auto; max-height: 20vh; padding: 0 16px; }
        .order-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-glass); gap: 8px; }
        .order-item:last-child { border-bottom: none; }
        .order-item-name { font-weight: 500; font-size: 0.8rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .order-item-qty { display: flex; align-items: center; gap: 4px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 8px; border: none; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .qty-btn:active { transform: scale(0.85); }
        .qty-btn.minus { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .qty-btn.plus { background: rgba(16,185,129,0.15); color: var(--accent-green); }
        .qty-num { font-weight: 800; min-width: 20px; text-align: center; font-size: 0.9rem; }
        .order-item-price { font-weight: 700; min-width: 55px; text-align: right; font-size: 0.8rem; }
        .empty-order { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.82rem; }

        /* Order Footer */
        .order-footer { padding: 10px 16px 16px; }

        .pay-methods {
            display: flex; gap: 6px; margin-bottom: 10px;
        }
        .pay-method-btn {
            padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border-glass-strong);
            background: var(--bg-glass); color: var(--text-secondary);
            font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap;
            transition: all var(--transition-fast);
        }
        .pay-method-btn.active { background: var(--accent-green); color: white; border-color: transparent; }

        .order-total {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; margin-bottom: 12px;
            background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(168,85,247,0.08));
            border: 1px solid rgba(99,102,241,0.15); border-radius: var(--radius-sm);
        }
        .order-total span:first-child { font-size: 0.82rem; font-weight: 500; color: var(--text-secondary); }
        .order-total span:last-child { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 800; color: var(--accent-blue); }

        /* Action Buttons - 2 rows for clarity */
        .order-actions-row {
            display: flex; gap: 8px; margin-bottom: 8px;
        }
        .order-actions-row:last-child { margin-bottom: 0; }

        .order-actions-row button {
            flex: 1; padding: 14px 8px; border: none; border-radius: var(--radius-sm);
            font-size: 0.76rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .order-actions-row button:active { transform: scale(0.94); }

        .btn-delete { background: rgba(239,68,68,0.12); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.2) !important; flex: 0 0 44px !important; font-size: 1.1rem !important; }
        .btn-send { background: var(--accent-blue); color: white; }
        .btn-transfer { background: linear-gradient(135deg,#6366f1,#4f46e5); color: white; }
        .btn-prebill { background: var(--accent-amber); color: white; }
        .btn-split { background: linear-gradient(135deg,#8b5cf6,#7c3aed); color: white; }
        .btn-pay { background: var(--accent-green); color: white; }

        /* ===== TOAST ===== */
        .toast-container { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { padding: 12px 24px; border-radius: var(--radius-sm); color: white; font-size: 0.82rem; font-weight: 600; animation: fadeUp 0.3s ease; }
        .toast.success { background: rgba(16,185,129,0.92); }
        .toast.error { background: rgba(239,68,68,0.92); }
        .toast.info { background: rgba(99,102,241,0.92); }
        .toast.warning { background: rgba(245,158,11,0.92); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

        /* ===== TABLET (768px+) ===== */
        @media (min-width: 768px) {
            .mesas-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); padding: 0 24px 24px; gap: 16px; }
            .section-title { padding: 24px 24px 12px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }

            .order-view .order-main-area { flex-direction: row; }
            .products-section { flex: 1; padding: 16px 20px; }
            .order-panel {
                max-height: none; width: 320px; border-radius: 0;
                border-left: 1px solid var(--border-glass); border-top: none;
            }
            .order-panel-header::before { display: none; }
            .order-items-scroll { max-height: none; flex: 1; }
        }

        @media (min-width: 1024px) {
            .mesas-grid { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); max-width: 1100px; margin: 0 auto; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .order-panel { width: 360px; }
        }

        /* Safe area */
        @supports (padding-top: env(safe-area-inset-top)) {
            .header { padding-top: calc(12px + env(safe-area-inset-top)); }
            .order-footer { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>

<body>
    <!-- Loading -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-orb"></div>
        <p>Cargando pedidos...</p>
    </div>

    <!-- Header -->
    <header class="header">
        <h1>📋 Pedidos</h1>
        <div class="header-btns">
            <button onclick="window.open('fichas-mesero.html','_blank')" title="Fichas">📖</button>
            <button id="btn-cocina-mesero" onclick="window.open('cocina.html','_blank')" title="Cocina" style="display:none;">🍳</button>
            <button id="btn-delivery-mesero" onclick="openDeliveryPanel()" title="Delivery" style="display:none;">🏍️</button>
            <button id="btn-home-mesero" onclick="window.location.href='index.html'" title="Inicio" style="display:none;">🏠</button>
            <button onclick="location.reload()" title="Recargar">🔄</button>
            <button onclick="auth.signOut().then(()=>window.location.href='login.html')" title="Salir">🚪</button>
        </div>
    </header>

    <!-- Vista de Mesas -->
    <div id="mesas-view">
        <div class="section-title">🛍️ Para Llevar</div>
        <div class="mesas-grid" id="llevar-grid"></div>
        <div class="section-title">🪑 Mesas del Local</div>
        <div class="mesas-grid" id="mesas-grid"></div>
    </div>

    <!-- Vista de Pedido -->
    <div class="order-view" id="order-view">
        <div class="order-header">
            <button class="btn-back" onclick="showMesas()">← Mesas</button>
            <h2>🍽️ <span id="order-mesa-name">Mesa 1</span></h2>
        </div>

        <div class="categories-bar" id="categories-bar"></div>

        <div class="order-main-area">
            <div class="products-section">
                <div style="padding:0 0 10px;">
                    <input type="text" id="product-search" placeholder="🔍 Buscar producto..." style="width:100%;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:10px;color:var(--text-primary);font-size:0.85rem;outline:none;">
                </div>
                <div class="products-grid" id="products-grid"></div>
            </div>

            <div class="order-panel">
                <div class="order-panel-header">
                    <h3>🧾 Pedido <span class="badge" id="order-count">0</span></h3>
                </div>

                <div class="order-items-scroll" id="order-items-list">
                    <p class="empty-order">Toca un producto para agregarlo</p>
                </div>

                <div class="order-footer">
                    <!-- Metodos de pago -->
                    <div class="pay-methods" id="pay-methods-section">
                        <button class="pay-method-btn active" onclick="selectPayMethod(this,'Efectivo')">💵 Efectivo</button>
                        <button class="pay-method-btn" onclick="selectPayMethod(this,'Tarjeta')">💳 Tarjeta</button>
                        <button class="pay-method-btn" onclick="selectPayMethod(this,'Transferencia')">🏦 Transf</button>
                    </div>

                    <!-- Total -->
                    <div class="order-total">
                        <span>Total</span>
                        <span id="order-total-value">$0</span>
                    </div>

                    <!-- Acciones - Fila 1: Enviar y Cambiar mesa -->
                    <div class="order-actions-row">
                        <button class="btn-delete" onclick="clearCurrentOrder()">🗑️</button>
                        <button class="btn-send" onclick="sendOrder()">📤 Enviar a cocina</button>
                        <button class="btn-transfer" onclick="transferOrder()">🔄 Cambiar mesa</button>
                    </div>

                    <!-- Acciones - Fila 2: Cobrar, Pre-cuenta, Dividir -->
                    <div class="order-actions-row">
                        <button class="btn-prebill" id="btn-prebill" onclick="printPreBill()">🧾 Pre-cuenta</button>
                        <button class="btn-split" id="btn-dividir" onclick="splitBill()">➗ Dividir</button>
                        <button class="btn-pay" id="btn-cobrar" onclick="payOrder()">💰 Cobrar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="tickets.js"></script>
    <script src="mesero.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
