<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestiónPro - Pantalla Cocina</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="cocina-styles.css">
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Conectando a cocina...</p>
    </div>

    <header class="header">
        <div class="header-left">
            <h1>🍳 Cocina</h1>
            <div class="header-stats" id="header-stats"></div>
        </div>
        <div class="header-right">
            <span class="clock" id="clock"></span>
            <button class="header-btn sound-btn" id="btn-sound" onclick="toggleSound()">🔔 Sonido</button>
            <button class="header-btn btn-fullscreen" onclick="toggleFullscreen()">⛶</button>
            <button class="header-btn" onclick="location.reload()">🔄</button>
            <button class="header-btn btn-home" onclick="window.location.href='index.html'">🏠</button>
        </div>
    </header>

    <div class="kanban-container" id="kanban-container">
        <div class="kanban-column col-new-bg">
            <div class="column-header col-new-header">
                <div class="col-header-left">
                    <span class="col-icon">🔥</span>
                    <span class="col-title">Nuevos</span>
                </div>
                <span class="col-count count-new" id="count-new">0</span>
            </div>
            <div class="column-body" id="body-new"></div>
        </div>
        <div class="kanban-column col-preparing-bg">
            <div class="column-header col-preparing-header">
                <div class="col-header-left">
                    <span class="col-icon">👨‍🍳</span>
                    <span class="col-title">Preparando</span>
                </div>
                <span class="col-count count-preparing" id="count-preparing">0</span>
            </div>
            <div class="column-body" id="body-preparing"></div>
        </div>
        <div class="kanban-column col-ready-bg">
            <div class="column-header col-ready-header">
                <div class="col-header-left">
                    <span class="col-icon">✅</span>
                    <span class="col-title">Listos para servir</span>
                </div>
                <span class="col-count count-ready" id="count-ready">0</span>
            </div>
            <div class="column-body" id="body-ready"></div>
        </div>
    </div>

    <div class="empty-kitchen" id="empty-kitchen" style="display:none;">
        <div class="empty-animation">
            <div class="chef-icon">👨‍🍳</div>
            <div class="steam steam-1">~</div>
            <div class="steam steam-2">~</div>
            <div class="steam steam-3">~</div>
        </div>
        <h2>Sin pedidos pendientes</h2>
        <p>Los nuevos pedidos aparecerán aquí automáticamente</p>
        <span class="empty-sub">Relájate, la cocina está al día 🎉</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="cocina-app.js"></script>
</body>
</html>
