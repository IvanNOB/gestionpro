<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Digital</title>
<meta name="theme-color" content="#1e293b">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; min-height: 100vh; }

.menu-header { background: linear-gradient(135deg, #1e293b, #334155); color: white; padding: 36px 20px; text-align: center; position: relative; overflow: hidden; }
.menu-header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%); }
.menu-logo { width: 70px; height: 70px; border-radius: 16px; margin-bottom: 12px; object-fit: cover; border: 3px solid rgba(255,255,255,0.2); }
.menu-header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; position: relative; }
.menu-header p { color: #94a3b8; font-size: 0.95rem; position: relative; }

.menu-container { max-width: 700px; margin: 0 auto; padding: 20px; }

.category-section { margin-bottom: 32px; }
.category-title { font-size: 1.2rem; font-weight: 800; color: #1e293b; padding: 16px 0 12px; border-bottom: 3px solid #2563eb; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }

.menu-item { display: flex; gap: 14px; padding: 16px; margin-bottom: 12px; background: white; border-radius: 14px; border: 1px solid #e2e8f0; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.menu-item:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
.menu-item-unavailable { opacity: 0.5; }

.menu-item-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; flex-shrink: 0; background: #f1f5f9; }
.menu-item-placeholder { width: 80px; height: 80px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg, #f1f5f9, #e2e8f0); display: flex; align-items: center; justify-content: center; font-size: 2rem; }

.menu-item-content { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
.menu-item-name { font-weight: 700; font-size: 1rem; color: #1e293b; margin-bottom: 4px; }
.menu-item-desc { font-size: 0.82rem; color: #64748b; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.menu-item-price { font-weight: 800; font-size: 1.1rem; color: #2563eb; }
.menu-item-unavailable .menu-item-price { color: #94a3b8; text-decoration: line-through; }
.out-badge { font-size: 0.7rem; background: #fee2e2; color: #dc2626; padding: 2px 8px; border-radius: 8px; font-weight: 600; margin-left: 8px; }

.menu-footer { text-align: center; padding: 32px 20px; color: #94a3b8; font-size: 0.8rem; }
.menu-footer a { color: #2563eb; text-decoration: none; }

.loading-menu { text-align: center; padding: 80px 20px; }
.loading-menu .spinner { width: 44px; height: 44px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-menu { text-align: center; padding: 80px 20px; color: #dc2626; }

/* Sin productos con foto: layout compacto */
.menu-item.no-image { padding: 12px 16px; }
.menu-item.no-image .menu-item-content { flex-direction: row; align-items: center; justify-content: space-between; }
.menu-item.no-image .menu-item-name { margin-bottom: 0; }
.menu-item.no-image .menu-item-price { margin-left: 12px; }

@media (max-width: 480px) {
    .menu-item-img, .menu-item-placeholder { width: 65px; height: 65px; }
    .menu-header { padding: 28px 16px; }
    .menu-header h1 { font-size: 1.5rem; }
    .menu-container { padding: 12px; }
}
</style>
</head>
<body>

<div class="loading-menu" id="loading-menu">
    <div class="spinner"></div>
    <p>Cargando menú...</p>
</div>

<div id="menu-content" style="display:none;">
    <div class="menu-header" id="menu-header">
        <h1 id="menu-business-name">Mi Negocio</h1>
        <p id="menu-slogan"></p>
    </div>
    <div class="menu-container" id="menu-items"></div>
    <div class="menu-footer">
        <p>Menú digital por <a href="#">GestiónPro</a></p>
    </div>
</div>

<div class="error-menu" id="error-menu" style="display:none;">
    <p>⚠️ No se pudo cargar el menú. Verifica el link.</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('u');

    if (!userId) {
        document.getElementById('loading-menu').style.display = 'none';
        document.getElementById('error-menu').style.display = 'block';
    } else {
        loadMenu(userId);
    }

    async function loadMenu(uid) {
        try {
            const userDoc = await db.collection('users').doc(uid).get();
            const productsSnap = await db.collection('users').doc(uid).collection('products').get();

            if (!userDoc.exists) throw new Error('Usuario no encontrado');

            const userData = userDoc.data();
            const settings = userData.settings || {};
            const products = productsSnap.docs.map(doc => doc.data());

            // Header
            document.getElementById('menu-business-name').textContent = settings.businessName || 'Mi Negocio';
            if (settings.customization?.slogan) {
                document.getElementById('menu-slogan').textContent = settings.customization.slogan;
            }
            if (settings.customization?.logo) {
                const img = document.createElement('img');
                img.src = settings.customization.logo;
                img.className = 'menu-logo';
                document.getElementById('menu-header').prepend(img);
            }
            if (settings.customization?.color) {
                document.querySelector('.menu-header').style.background = `linear-gradient(135deg, ${settings.customization.color}, #1e293b)`;
                document.documentElement.style.setProperty('--accent', settings.customization.color);
            }

            // Título de la página
            document.title = (settings.businessName || 'Mi Negocio') + ' - Menú';

            // Agrupar por categoría
            const categories = {};
            products.forEach(p => {
                if (!categories[p.category]) categories[p.category] = [];
                categories[p.category].push(p);
            });

            // Render
            const container = document.getElementById('menu-items');
            const catIcons = { 'Alimentos':'🍽️', 'Bebidas':'🥤', 'Ropa':'👕', 'Electrónica':'📱', 'Hogar':'🏠', 'Belleza':'💄', 'Deportes':'⚽', 'Accesorios':'💍', 'Tecnología':'💻', 'Salud':'💊', 'Mascotas':'🐾', 'Papelería':'📝', 'Otro':'📦' };
            const catPlaceholders = { 'Alimentos':'🍽️', 'Bebidas':'🥤', 'Ropa':'👕', 'Electrónica':'📱', 'Hogar':'🏠', 'Belleza':'💄', 'Otro':'📦' };

            let html = '';
            Object.entries(categories).sort((a, b) => a[0].localeCompare(b[0])).forEach(([cat, items]) => {
                html += `<div class="category-section">`;
                html += `<div class="category-title">${catIcons[cat] || '📦'} ${cat}</div>`;

                items.sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
                    const unavailable = p.quantity <= 0;
                    const currency = settings.currency === 'COP' ? '$' + Math.round(p.price).toLocaleString('es-CO') : '$' + p.price.toFixed(2);
                    const hasImage = p.image && p.image.trim();
                    const hasDesc = p.description && p.description.trim();
                    const placeholder = catPlaceholders[cat] || '📦';

                    let imageHtml = '';
                    if (hasImage) {
                        imageHtml = `<img class="menu-item-img" src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy" onerror="this.style.display='none'">`;
                    } else if (hasDesc) {
                        imageHtml = `<div class="menu-item-placeholder">${placeholder}</div>`;
                    }

                    if (hasImage || hasDesc) {
                        html += `<div class="menu-item ${unavailable ? 'menu-item-unavailable' : ''}">
                            ${imageHtml}
                            <div class="menu-item-content">
                                <div class="menu-item-name">${esc(p.name)}${unavailable ? '<span class="out-badge">Agotado</span>' : ''}</div>
                                ${hasDesc ? `<div class="menu-item-desc">${esc(p.description)}</div>` : ''}
                                <div class="menu-item-price">${currency}</div>
                            </div>
                        </div>`;
                    } else {
                        html += `<div class="menu-item no-image ${unavailable ? 'menu-item-unavailable' : ''}">
                            <div class="menu-item-content">
                                <div class="menu-item-name">${esc(p.name)}${unavailable ? '<span class="out-badge">Agotado</span>' : ''}</div>
                                <div class="menu-item-price">${currency}</div>
                            </div>
                        </div>`;
                    }
                });

                html += `</div>`;
            });

            container.innerHTML = html;

            document.getElementById('loading-menu').style.display = 'none';
            document.getElementById('menu-content').style.display = 'block';

        } catch (e) {
            console.error(e);
            document.getElementById('loading-menu').style.display = 'none';
            document.getElementById('error-menu').style.display = 'block';
        }
    }

    function esc(text) { const d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }
</script>
</body>
</html>
