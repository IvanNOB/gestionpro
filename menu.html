<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Digital</title>
<meta name="theme-color" content="#1e293b">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Georgia', 'Times New Roman', serif; background: #faf8f5; color: #2c2c2c; min-height: 100vh; }

.menu-header { background: linear-gradient(135deg, #1e293b, #334155); color: white; padding: 36px 20px; text-align: center; }
.menu-logo { width: 70px; height: 70px; border-radius: 16px; margin-bottom: 12px; object-fit: cover; border: 3px solid rgba(255,255,255,0.2); }
.menu-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; font-family: 'Georgia', serif; letter-spacing: 0.5px; }
.menu-header p { color: #cbd5e1; font-size: 0.9rem; font-family: -apple-system, sans-serif; }

.menu-container { max-width: 750px; margin: 0 auto; padding: 24px 16px; }

.category-section { margin-bottom: 36px; }
.category-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #e0dcd5; }
.category-title { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; font-family: 'Georgia', serif; }
.category-count { font-size: 0.85rem; color: #8b7e6a; font-family: -apple-system, sans-serif; }

.products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.product-card { background: #fff; border: 1px solid #e8e3da; border-radius: 16px; overflow: hidden; transition: all 0.2s; }
.product-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }

.product-card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #f0ebe3; display: block; }
.product-card-placeholder { width: 100%; aspect-ratio: 4/3; background: linear-gradient(180deg, #f0ebe3, #e8e3da); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

.product-card-body { padding: 14px 16px 16px; }
.product-card-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
.product-card-name { font-size: 1rem; font-weight: 700; color: #1a1a1a; font-family: 'Georgia', serif; line-height: 1.3; }
.product-card-price { font-size: 1rem; font-weight: 700; color: #c0392b; white-space: nowrap; font-family: -apple-system, sans-serif; }

.product-card-desc { font-size: 0.82rem; color: #6b5e4f; line-height: 1.5; font-family: -apple-system, sans-serif; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

.product-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; font-family: -apple-system, sans-serif; }
.badge-popular { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
.badge-new { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
.badge-out { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

.product-card-unavailable { opacity: 0.5; }
.product-card-unavailable .product-card-price { text-decoration: line-through; color: #999; }

.menu-footer { text-align: center; padding: 32px 20px; color: #8b7e6a; font-size: 0.8rem; font-family: -apple-system, sans-serif; }

.loading-menu { text-align: center; padding: 80px 20px; }
.loading-menu .spinner { width: 44px; height: 44px; border: 3px solid #e8e3da; border-top-color: #1e293b; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-menu p { color: #8b7e6a; font-family: -apple-system, sans-serif; }

.error-menu { text-align: center; padding: 80px 20px; color: #c0392b; font-family: -apple-system, sans-serif; }

@media (max-width: 500px) {
    .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .product-card-body { padding: 10px 12px 12px; }
    .product-card-name { font-size: 0.9rem; }
    .product-card-price { font-size: 0.9rem; }
    .product-card-desc { font-size: 0.75rem; }
    .category-title { font-size: 1.3rem; }
    .menu-header { padding: 28px 16px; }
    .menu-header h1 { font-size: 1.5rem; }
}
</style>
</head>
<body>

<div class="loading-menu" id="loading-menu">
    <div class="spinner"></div>
    <p>Cargando menú...</p>
</div>

<div id="menu-content" style="display:none;">
    <div class="menu-header" id="menu-header">
        <h1 id="menu-business-name">Mi Negocio</h1>
        <p id="menu-slogan"></p>
    </div>
    <div class="menu-container" id="menu-items"></div>
    <div class="menu-footer">
        <p>Menú digital por GestiónPro</p>
    </div>
</div>

<div class="error-menu" id="error-menu" style="display:none;">
    <p>⚠️ No se pudo cargar el menú. Verifica el link.</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const userId = params.get('u');

if (!userId) {
    document.getElementById('loading-menu').style.display = 'none';
    document.getElementById('error-menu').style.display = 'block';
} else {
    loadMenu(userId);
}

async function loadMenu(uid) {
    try {
        let settings = { businessName: 'Mi Negocio', currency: 'COP', customization: {} };
        
        // Intentar cargar datos del negocio (puede fallar si hay reglas restrictivas)
        try {
            const userDoc = await db.collection('users').doc(uid).get();
            if (userDoc.exists) {
                const userData = userDoc.data();
                settings = userData.settings || settings;
            }
        } catch (e) {
            console.warn('No se pudo cargar info del negocio, usando defaults');
        }

        // Cargar productos (siempre público)
        const productsSnap = await db.collection('users').doc(uid).collection('products').get();
        const products = productsSnap.docs.map(doc => doc.data());

        // Header
        document.getElementById('menu-business-name').textContent = settings.businessName || 'Mi Negocio';
        document.title = (settings.businessName || 'Mi Negocio') + ' - Menú';
        if (settings.customization?.slogan) {
            document.getElementById('menu-slogan').textContent = settings.customization.slogan;
        }
        if (settings.customization?.logo) {
            const img = document.createElement('img');
            img.src = settings.customization.logo;
            img.className = 'menu-logo';
            document.getElementById('menu-header').prepend(img);
        }
        if (settings.customization?.color) {
            document.querySelector('.menu-header').style.background = `linear-gradient(135deg, ${settings.customization.color}, #1e293b)`;
        }

        // Agrupar por categoría
        const categories = {};
        products.forEach(p => {
            if (!categories[p.category]) categories[p.category] = [];
            categories[p.category].push(p);
        });

        // Render
        const container = document.getElementById('menu-items');
        const catPlaceholders = { 'Alimentos':'🍽️', 'Bebidas':'🥤', 'Ropa':'👕', 'Electrónica':'📱', 'Hogar':'🏠', 'Belleza':'💄', 'Deportes':'⚽', 'Otro':'📦' };

        let html = '';
        Object.entries(categories).sort((a, b) => a[0].localeCompare(b[0])).forEach(([cat, items]) => {
            const availableCount = items.filter(p => p.quantity > 0).length;
            html += `<div class="category-section">`;
            html += `<div class="category-header">
                <span class="category-title">${esc(cat)}</span>
                <span class="category-count">${String(availableCount).padStart(2, '0')}</span>
            </div>`;
            html += `<div class="products-grid">`;

            items.sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
                const unavailable = p.quantity <= 0;
                const currency = settings.currency === 'COP' ? '$' + Math.round(p.price).toLocaleString('es-CO') : '$' + p.price.toFixed(2);
                const hasImage = p.image && p.image.trim();
                const placeholder = catPlaceholders[cat] || '📦';

                let imageHtml = hasImage
                    ? `<img class="product-card-img" src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy" onerror="this.outerHTML='<div class=product-card-placeholder>${placeholder}</div>'">`
                    : `<div class="product-card-placeholder">${placeholder}</div>`;

                let badgeHtml = '';
                if (unavailable) {
                    badgeHtml = `<span class="product-badge badge-out">Agotado</span>`;
                }

                html += `<div class="product-card ${unavailable ? 'product-card-unavailable' : ''}">
                    ${imageHtml}
                    <div class="product-card-body">
                        <div class="product-card-top">
                            <span class="product-card-name">${esc(p.name)}</span>
                            <span class="product-card-price">${currency}</span>
                        </div>
                        ${p.description ? `<div class="product-card-desc">${esc(p.description)}</div>` : ''}
                        ${badgeHtml}
                    </div>
                </div>`;
            });

            html += `</div></div>`;
        });

        container.innerHTML = html;
        document.getElementById('loading-menu').style.display = 'none';
        document.getElementById('menu-content').style.display = 'block';

    } catch (e) {
        console.error(e);
        document.getElementById('loading-menu').style.display = 'none';
        document.getElementById('error-menu').style.display = 'block';
    }
}

function esc(text) { const d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }
</script>
</body>
</html>
