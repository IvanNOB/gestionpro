<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestiónPro - Admin Remote</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.admin-bar { background: #dc2626; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 9999; }
.admin-bar h3 { font-size: 0.9rem; }
.admin-bar button { background: white; color: #dc2626; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
.section { padding: 20px; max-width: 1000px; margin: 0 auto; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.card h3 { color: #f1f5f9; margin-bottom: 12px; font-size: 1.1rem; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 14px; text-align: center; }
.stat .value { font-size: 1.3rem; font-weight: 800; color: #f1f5f9; }
.stat .label { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; }
th { color: #94a3b8; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
.loading { text-align: center; padding: 60px; color: #64748b; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 8px 16px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; cursor: pointer; font-size: 0.85rem; color: #94a3b8; }
.tab.active { background: #2563eb; color: white; border-color: #2563eb; }
.btn-action { padding: 8px 14px; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-right: 8px; }
.btn-edit { background: rgba(99,91,255,0.15); color: #93c5fd; border: 1px solid rgba(99,91,255,0.3); }
.btn-delete { background: rgba(220,38,38,0.15); color: #fca5a5; border: 1px solid rgba(220,38,38,0.3); }
</style>
</head>
<body>
<div class="admin-bar">
    <h3>🛡️ ADMIN REMOTO — <span id="remote-user-name">Cargando...</span></h3>
    <button onclick="window.close()">✕ Cerrar</button>
</div>

<div class="section">
    <div class="tabs" id="tabs">
        <div class="tab active" onclick="showTab('overview')">📊 Resumen</div>
        <div class="tab" onclick="showTab('products')">📦 Productos</div>
        <div class="tab" onclick="showTab('sales')">💰 Ventas</div>
        <div class="tab" onclick="showTab('employees')">👥 Empleados</div>
        <div class="tab" onclick="showTab('settings')">⚙️ Config</div>
        <div class="tab" onclick="showTab('demo')" style="background:rgba(99,91,255,0.15);color:#818cf8;border-color:rgba(99,91,255,0.3);">🧪 Demo</div>
    </div>

    <div id="content">
        <div class="loading">Cargando datos del usuario...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const ADMIN_EMAILS = ['kalethcano0216@gmail.com'];
const params = new URLSearchParams(window.location.search);
const targetUid = params.get('uid');

let userData = {};
let products = [];
let sales = [];
let employees = [];
let mesas = [];
let expenses = [];

auth.onAuthStateChanged(async (user) => {
    if (!user || !ADMIN_EMAILS.includes(user.email.toLowerCase())) {
        document.getElementById('content').innerHTML = '<p style="color:#dc2626;text-align:center;padding:40px;">⛔ Acceso denegado</p>';
        return;
    }
    if (!targetUid) {
        document.getElementById('content').innerHTML = '<p style="color:#dc2626;text-align:center;padding:40px;">No se especificó usuario</p>';
        return;
    }
    await loadUserData();
});

async function loadUserData() {
    try {
        const userDoc = await db.collection('users').doc(targetUid).get();
        userData = userDoc.exists ? userDoc.data() : {};
        document.getElementById('remote-user-name').textContent = userData.settings?.businessName || userData.businessName || userData.email || targetUid;

        const [prodSnap, salesSnap, empSnap, mesasSnap, expSnap] = await Promise.all([
            db.collection('users').doc(targetUid).collection('products').get(),
            db.collection('users').doc(targetUid).collection('sales').orderBy('date', 'desc').get(),
            db.collection('users').doc(targetUid).collection('employees').get(),
            db.collection('users').doc(targetUid).collection('mesas').get(),
            db.collection('users').doc(targetUid).collection('expenses').get()
        ]);

        products = prodSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        sales = salesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        employees = empSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        mesas = mesasSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        expenses = expSnap.docs.map(d => ({ id: d.id, ...d.data() }));

        showTab('overview');
    } catch (e) {
        document.getElementById('content').innerHTML = `<p style="color:#dc2626;padding:40px;">Error: ${e.message}</p>`;
    }
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const activeTab = document.querySelector(`.tab[onclick*="'${tab}'"]`);
    if (activeTab) activeTab.classList.add('active');

    const content = document.getElementById('content');

    if (tab === 'overview') {
        const totalSales = sales.reduce((s, v) => s + (v.total || 0), 0);
        const totalProfit = sales.reduce((s, v) => s + (v.profit || 0), 0);
        const totalExpenses = expenses.reduce((s, e) => s + (e.amount || 0), 0);
        content.innerHTML = `
            <div class="stat-grid">
                <div class="stat"><div class="value">${products.length}</div><div class="label">Productos</div></div>
                <div class="stat"><div class="value">${sales.length}</div><div class="label">Ventas (total)</div></div>
                <div class="stat"><div class="value">${employees.length}</div><div class="label">Empleados</div></div>
                <div class="stat"><div class="value">${mesas.length}</div><div class="label">Mesas</div></div>
                <div class="stat"><div class="value">$${Math.round(totalSales).toLocaleString('es-CO')}</div><div class="label">Ingresos</div></div>
                <div class="stat"><div class="value">$${Math.round(totalProfit).toLocaleString('es-CO')}</div><div class="label">Ganancia</div></div>
                <div class="stat"><div class="value">$${Math.round(totalExpenses).toLocaleString('es-CO')}</div><div class="label">Gastos</div></div>
                <div class="stat"><div class="value">${userData.plan || 'free'}</div><div class="label">Plan</div></div>
            </div>
            <div class="card"><h3>📋 Info</h3>
                <p>Email: ${esc(userData.email || '-')}</p>
                <p>Negocio: ${esc(userData.settings?.businessName || '-')}</p>
                <p>Moneda: ${esc(userData.settings?.currency || 'COP')}</p>
                <p>UID: <code style="font-size:0.75rem;color:#64748b;">${targetUid}</code></p>
            </div>`;
    } else if (tab === 'products') {
        content.innerHTML = `<div class="card"><h3>📦 Productos (${products.length})</h3>
            <div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn-action btn-edit" onclick="exportProductsCSV()">📥 Exportar CSV</button>
                <button class="btn-action btn-edit" onclick="exportProductsCarta()">📋 Exportar Carta</button>
                <button class="btn-action btn-edit" onclick="printCarta()">🖨️ Imprimir Carta</button>
            </div>
            <table><thead><tr><th>Nombre</th><th>Categoría</th><th>Stock</th><th>Costo</th><th>Precio</th><th>Acción</th></tr></thead>
            <tbody>${products.map(p => `<tr>
                <td>${esc(p.name)}</td><td>${esc(p.category || '-')}</td><td>${p.quantity}</td>
                <td>$${Math.round(p.cost || 0).toLocaleString('es-CO')}</td>
                <td>$${Math.round(p.price || 0).toLocaleString('es-CO')}</td>
                <td><button class="btn-action btn-delete" onclick="deleteRemoteDoc('products','${p.id}','${esc(p.name)}')">🗑️</button></td>
            </tr>`).join('')}</tbody></table></div>`;
    } else if (tab === 'sales') {
        const today = new Date().toISOString().split('T')[0];
        content.innerHTML = `<div class="card"><h3>💰 Ventas</h3>
            <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
                <input type="date" id="admin-sales-date" value="${today}" onchange="filterAdminSales()" style="padding:8px 12px;border:1px solid #334155;border-radius:8px;background:#0a0e1a;color:#e2e8f0;font-size:0.85rem;">
                <button onclick="document.getElementById('admin-sales-date').value='';filterAdminSales()" class="btn-action btn-edit">Ver todas</button>
                <span id="admin-sales-count" style="color:#94a3b8;font-size:0.85rem;"></span>
            </div>
            <div id="admin-sales-table"></div></div>`;
        filterAdminSales();
    } else if (tab === 'employees') {
        content.innerHTML = `<div class="card"><h3>👥 Empleados (${employees.length})</h3>
            <table><thead><tr><th>Nombre</th><th>Rol</th><th>PIN (hash)</th><th>Activo</th><th>Acción</th></tr></thead>
            <tbody>${employees.map(e => `<tr>
                <td>${esc(e.name)}</td><td>${esc(e.role)}</td>
                <td style="font-size:0.7rem;color:#64748b;">${e.pin ? e.pin.substring(0,8) + '...' : 'Sin PIN'}</td>
                <td>${e.active !== false ? '✅' : '❌'}</td>
                <td><button class="btn-action btn-delete" onclick="deleteRemoteDoc('employees','${e.id}','${esc(e.name)}')">🗑️</button></td>
            </tr>`).join('')}</tbody></table></div>`;
    } else if (tab === 'settings') {
        const s = userData.settings || {};
        content.innerHTML = `<div class="card"><h3>⚙️ Configuración</h3>
            <pre style="background:#0f172a;padding:16px;border-radius:10px;font-size:0.8rem;overflow:auto;color:#94a3b8;">${JSON.stringify(s, null, 2)}</pre></div>
            <div class="card"><h3>🔧 Acciones Remotas</h3>
                <button class="btn-action btn-edit" onclick="resetUserSettings()">🔄 Resetear Settings</button>
                <button class="btn-action btn-edit" onclick="fixUserPlan()">💳 Activar Plan Restaurant</button>
                <button class="btn-action btn-delete" onclick="clearUserSales()">🗑️ Borrar Ventas</button>
            </div>`;
    } else if (tab === 'demo') {
        const businessName = userData.settings?.businessName || userData.businessName || 'Este negocio';
        content.innerHTML = `
            <div class="card" style="border:2px solid #635bff;">
                <h3 style="color:#818cf8;">🧪 Cargar Demo Completa en "${esc(businessName)}"</h3>
                <p style="color:#94a3b8;font-size:0.85rem;margin-bottom:20px;">Esto cargará datos de prueba en la cuenta de <strong style="color:#f1f5f9;">${esc(businessName)}</strong> (UID: ${targetUid.substring(0,8)}...). Incluye:</p>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;">
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.8rem;">📦 <strong>10 productos</strong><br><span style="color:#64748b;">Cafetería, Panadería, Bebidas, Comidas</span></div>
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.8rem;">🪑 <strong>6 mesas</strong><br><span style="color:#64748b;">Mesa 1 a Mesa 6</span></div>
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.8rem;">👥 <strong>3 empleados</strong><br><span style="color:#64748b;">Carlos/1234, Laura/5678, Miguel/0000</span></div>
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.8rem;">🧑 <strong>4 clientes</strong><br><span style="color:#64748b;">Con teléfono y notas</span></div>
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.8rem;">🚚 <strong>3 proveedores</strong><br><span style="color:#64748b;">Con contacto</span></div>
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.8rem;">💰 <strong>~30 ventas</strong><br><span style="color:#64748b;">Últimos 7 días (gráficas)</span></div>
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.8rem;">💸 <strong>5 gastos</strong><br><span style="color:#64748b;">Arriendo, servicios, sueldos</span></div>
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.8rem;">🧂 <strong>5 insumos</strong><br><span style="color:#64748b;">Café, leche, queso, carne, pan</span></div>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn-action" style="background:#635bff;color:white;padding:12px 24px;font-size:0.9rem;border-radius:10px;" onclick="loadDemoForRemoteUser()">🚀 Cargar Demo Completa</button>
                    <button class="btn-action" style="background:rgba(99,91,255,0.15);color:#818cf8;padding:12px 24px;font-size:0.9rem;border-radius:10px;border:1px solid rgba(99,91,255,0.3);" onclick="loadDemoProductsOnly()">📦 Solo Productos</button>
                </div>
                <p style="color:#64748b;font-size:0.75rem;margin-top:14px;">⚠️ Esto NO borra datos existentes — solo agrega los de demo encima.</p>
            </div>`;
    }
}

async function deleteRemoteDoc(collection, docId, name) {
    try {
        await db.collection('users').doc(targetUid).collection(collection).doc(docId).delete();
        showNotice(`"${name}" eliminado`);
        await loadUserData();
    } catch (e) { showNotice('Error: ' + e.message); }
}

async function resetUserSettings() {
    try {
        await db.collection('users').doc(targetUid).update({
            settings: { businessName: userData.settings?.businessName || 'Mi Negocio', currency: 'COP', defaultTax: 19, defaultMargin: 30, theme: 'light', monthlyGoal: 0 }
        });
        showNotice('Settings reseteados');
        await loadUserData();
    } catch (e) { showNotice('Error: ' + e.message); }
}

async function fixUserPlan() {
    try {
        await db.collection('users').doc(targetUid).update({ plan: 'restaurant', 'settings.plan': 'restaurant' });
        showNotice('Plan activado: Restaurant');
        await loadUserData();
    } catch (e) { showNotice('Error: ' + e.message); }
}

async function clearUserSales() {
    if (!confirm('¿Borrar TODAS las ventas de este usuario?')) return;
    try {
        const snap = await db.collection('users').doc(targetUid).collection('sales').get();
        const batch = db.batch();
        snap.docs.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        showNotice('Ventas borradas');
        await loadUserData();
    } catch (e) { showNotice('Error: ' + e.message); }
}

function filterAdminSales() {
    const dateFilter = document.getElementById('admin-sales-date')?.value || '';
    let filtered = sales;
    if (dateFilter) {
        filtered = sales.filter(s => s.date && s.date.startsWith(dateFilter));
    }
    const total = filtered.reduce((s, v) => s + (v.total || 0), 0);
    const countEl = document.getElementById('admin-sales-count');
    if (countEl) countEl.textContent = `${filtered.length} ventas — Total: $${Math.round(total).toLocaleString('es-CO')}`;
    const container = document.getElementById('admin-sales-table');
    if (!container) return;
    container.innerHTML = `<table><thead><tr><th>Fecha</th><th>Producto</th><th>Cant</th><th>Total</th><th>Método</th><th>Vendió</th></tr></thead>
        <tbody>${filtered.map(s => `<tr>
            <td>${new Date(s.date).toLocaleDateString('es-CO', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
            <td>${esc(s.productName || '-')}</td><td>${s.quantity}</td>
            <td>$${Math.round(s.total || 0).toLocaleString('es-CO')}</td>
            <td>${esc(s.method || '-')}</td>
            <td>${esc(s.soldBy || '-')}</td>
        </tr>`).join('')}</tbody></table>`;
}

function exportProductsCSV() {
    const businessName = userData.settings?.businessName || userData.businessName || 'Negocio';
    const headers = ['Producto', 'Categoría', 'Precio', 'Descripción'];
    const rows = products.map(p => [p.name, p.category || '', '$' + Math.round(p.price || 0).toLocaleString('es-CO'), p.description || '']);
    const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `productos-${businessName.replace(/\s+/g, '-')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showNotice('CSV exportado');
}

function exportProductsCarta() {
    const businessName = userData.settings?.businessName || userData.businessName || 'Restaurante';
    const categories = {};
    products.forEach(p => {
        if (!categories[p.category]) categories[p.category] = [];
        categories[p.category].push(p);
    });

    let text = `═══════════════════════════════\n`;
    text += `   ${businessName.toUpperCase()}\n`;
    text += `   CARTA DE PRODUCTOS\n`;
    text += `═══════════════════════════════\n\n`;

    Object.entries(categories).sort((a, b) => a[0].localeCompare(b[0])).forEach(([cat, items]) => {
        text += `── ${cat.toUpperCase()} ──\n`;
        items.sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
            const price = '$' + Math.round(p.price || 0).toLocaleString('es-CO');
            const desc = p.description ? `  (${p.description})` : '';
            text += `  ${p.name}${desc}\n`;
            text += `    ${price}\n`;
        });
        text += `\n`;
    });

    text += `═══════════════════════════════\n`;
    text += `  Restaurante aliado GestiónPro\n`;

    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `carta-${businessName.replace(/\s+/g, '-')}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    showNotice('Carta exportada');
}

function printCarta() {
    const businessName = userData.settings?.businessName || userData.businessName || 'Restaurante';
    const categories = {};
    products.forEach(p => {
        if (!categories[p.category]) categories[p.category] = [];
        categories[p.category].push(p);
    });

    let itemsHtml = '';
    Object.entries(categories).sort((a, b) => a[0].localeCompare(b[0])).forEach(([cat, items]) => {
        itemsHtml += `<div class="category-section">
            <h2 class="cat-title">${esc(cat)}</h2>
            <div class="products-grid">`;
        items.sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
            const hasImage = p.image && p.image.trim();
            itemsHtml += `<div class="product-card">
                ${hasImage ? `<img src="${esc(p.image)}" class="product-img">` : `<div class="product-img-placeholder">🍽️</div>`}
                <div class="product-info">
                    <h3 class="product-name">${esc(p.name)}</h3>
                    ${p.description ? `<p class="product-desc">${esc(p.description)}</p>` : ''}
                    <div class="product-price">$${Math.round(p.price || 0).toLocaleString('es-CO')}</div>
                </div>
            </div>`;
        });
        itemsHtml += `</div></div>`;
    });

    const html = `<!DOCTYPE html><html><head><style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 24px; color: #1e293b; background: #fff; }
        .header { text-align: center; margin-bottom: 48px; padding-bottom: 24px; border-bottom: 3px solid #1e293b; }
        .header h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .header p { color: #64748b; font-size: 1rem; }
        .category-section { margin-bottom: 48px; }
        .cat-title { font-size: 1.4rem; font-weight: 700; color: #1e293b; padding-bottom: 12px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; letter-spacing: 0.5px; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .product-card { display: flex; gap: 14px; padding: 16px; border: 1px solid #e2e8f0; border-radius: 14px; background: #fafafa; }
        .product-img { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
        .product-img-placeholder { width: 90px; height: 90px; border-radius: 10px; flex-shrink: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .product-name { font-size: 1rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .product-desc { font-size: 0.8rem; color: #64748b; line-height: 1.4; margin-bottom: 6px; }
        .product-price { font-size: 1.1rem; font-weight: 800; color: #dc2626; }
        .footer { text-align: center; margin-top: 48px; padding-top: 24px; border-top: 2px solid #e2e8f0; color: #94a3b8; font-size: 0.85rem; }
        @media print {
            body { padding: 20px; }
            .product-card { break-inside: avoid; }
        }
        @media (max-width: 600px) {
            .products-grid { grid-template-columns: 1fr; }
        }
    </style></head><body>
        <div class="header">
            <h1>${esc(businessName)}</h1>
            <p>Carta de Productos</p>
        </div>
        ${itemsHtml}
        <div class="footer">Restaurante aliado — GestiónPro</div>
        <script>window.onload=function(){window.print();}<\/script>
    </body></html>`;

    const win = window.open('', '_blank', 'width=900,height=700');
    if (win) { win.document.write(html); win.document.close(); }
    else { showNotice('Permite ventanas emergentes'); }
}

function showNotice(msg) {
    const n = document.createElement('div');
    n.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:12px 24px;border-radius:10px;font-size:0.9rem;z-index:9999;border:1px solid #334155;';
    n.textContent = msg;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 3000);
}

function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); }

async function hashPinAdmin(pin) {
    const encoder = new TextEncoder();
    const data = encoder.encode(pin + '_gestionpro_salt');
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}
