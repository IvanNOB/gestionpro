<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestiónPro - Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 48px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            color: #f1f5f9;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .login-header .badge {
            display: inline-block;
            background: #dc2626;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #3b82f6;
        }
        .form-group input::placeholder {
            color: #475569;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #ef4444;
        }
        .error-msg {
            display: none;
            text-align: center;
            padding: 12px;
            background: #7f1d1d;
            color: #fca5a5;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 16px;
            color: #94a3b8;
        }
        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 4px solid #334155;
            border-top-color: #dc2626;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <span class="badge">ADMIN</span>
            <h1>🛡️ Panel de Control</h1>
            <p>Acceso solo para administradores</p>
        </div>

        <form id="admin-login-form">
            <div class="form-group">
                <label>Correo de administrador</label>
                <input type="email" id="admin-email-input" placeholder="admin@correo.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="admin-password-input" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn-login">🔐 Acceder al Panel</button>
        </form>

        <div class="error-msg" id="error-msg"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Verificando...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // Correos autorizados como admin
        const ADMIN_EMAILS = ['kalethcano0216@gmail.com'];

        // Si ya está logueado como admin, redirigir
        auth.onAuthStateChanged((user) => {
            if (user && ADMIN_EMAILS.includes(user.email.toLowerCase())) {
                window.location.href = 'admin.html';
            }
        });

        // Formulario
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email-input').value.trim();
            const password = document.getElementById('admin-password-input').value;

            // Verificar que es un correo de admin antes de intentar login
            if (!ADMIN_EMAILS.includes(email.toLowerCase())) {
                showError('Este correo no tiene permisos de administrador.');
                return;
            }

            showLoading(true);
            hideError();

            try {
                await auth.signInWithEmailAndPassword(email, password);
                // La redirección la maneja onAuthStateChanged
            } catch (error) {
                showLoading(false);
                const messages = {
                    'auth/wrong-password': 'Contraseña incorrecta.',
                    'auth/user-not-found': 'No existe una cuenta con este correo.',
                    'auth/too-many-requests': 'Demasiados intentos. Espera un momento.',
                    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
                    'auth/network-request-failed': 'Error de conexión.'
                };
                showError(messages[error.code] || 'Error: ' + error.code);
            }
        });

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError() {
            document.getElementById('error-msg').style.display = 'none';
        }
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
